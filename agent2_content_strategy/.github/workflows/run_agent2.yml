name: Run Content Strategy Agent (Agent 2)

on:
  schedule:
    - cron: '0 4 * * 2'  # Tuesdays 4 AM UTC
  workflow_dispatch:
    inputs:
      min_score:
        description: 'Minimum AEO score for query selection'
        default: '7.0'
      limit:
        description: 'Max queries to process'
        default: '20'
      test_mode:
        description: 'Skip Supabase writes (true/false)'
        default: 'false'

jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent2_content_strategy

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: agent2_content_strategy/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Agent 2
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python src/main.py \
            --batch-mode \
            --min-score ${{ github.event.inputs.min_score || '7.0' }} \
            --limit ${{ github.event.inputs.limit || '20' }} \
            ${{ github.event.inputs.test_mode == 'true' && '--test-mode' || '' }}

      - name: Upload generated briefs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: content-briefs-${{ github.run_id }}
          path: agent2_content_strategy/output/briefs/
          retention-days: 30
