<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 110">
  <rect width="200" height="110" rx="8" fill="#3C8018"/>

  <!-- Leaf made of 12 white circles -->
  <g fill="white">
    <!-- Tip -->
    <circle cx="52" cy="12" r="5"/>
    <!-- Row 2 -->
    <circle cx="44" cy="24" r="5"/>
    <circle cx="60" cy="24" r="5"/>
    <!-- Row 3 -->
    <circle cx="36" cy="38" r="5"/>
    <circle cx="52" cy="38" r="5"/>
    <circle cx="68" cy="38" r="5"/>
    <!-- Row 4 -->
    <circle cx="38" cy="52" r="5"/>
    <circle cx="54" cy="52" r="5"/>
    <circle cx="68" cy="52" r="5"/>
    <!-- Row 5 -->
    <circle cx="42" cy="66" r="5"/>
    <circle cx="58" cy="66" r="5"/>
    <!-- Base -->
    <circle cx="50" cy="79" r="5"/>
  </g>
  <!-- Stem -->
  <line x1="50" y1="84" x2="50" y2="96" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/>

  <!-- Divider -->
  <line x1="96" y1="10" x2="96" y2="100" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- EU text -->
  <text x="148" y="40" font-family="Arial Black,Arial,sans-serif" font-size="26" font-weight="900" fill="white" text-anchor="middle" letter-spacing="2">EU</text>
  <text x="148" y="62" font-family="Arial Black,Arial,sans-serif" font-size="16" font-weight="900" fill="white" text-anchor="middle" letter-spacing="0.3">ORGANIC</text>
  <text x="148" y="80" font-family="Arial,sans-serif" font-size="8.5" font-weight="500" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="1">FARMING</text>
</svg>
