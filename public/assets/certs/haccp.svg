  <!-- Subtle glow behind checkmark -->
  <polyline points="28,68 46,88 84,46" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="28,68 46,88 84,46" fill="none" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- HACCP text at top of shield -->
  <text x="55" y="36" font-family="Arial Black,Arial,sans-serif" font-size="16" font-weight="900" fill="white" text-anchor="middle" letter-spacing="0.5">HACCP</text>
