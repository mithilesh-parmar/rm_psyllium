  <!-- Tick marks around border -->
  <g stroke="rgba(255,255,255,0.35)" stroke-width="1.2" stroke-linecap="round">
    <line x1="60" y1="4" x2="60" y2="10"/>
    <line x1="60" y1="110" x2="60" y2="116"/>
    <line x1="4" y1="60" x2="10" y2="60"/>
    <line x1="110" y1="60" x2="116" y2="60"/>
    <line x1="17" y1="17" x2="21.5" y2="21.5"/>
    <line x1="98.5" y1="98.5" x2="103" y2="103"/>
    <line x1="103" y1="17" x2="98.5" y2="21.5"/>
    <line x1="21.5" y1="98.5" x2="17" y2="103"/>
    <line x1="38" y1="4.5" x2="39.5" y2="10"/>
    <line x1="82" y1="110" x2="80.5" y2="116"/>
    <line x1="4.5" y1="38" x2="10" y2="39.5"/>
    <line x1="110" y1="82" x2="115.5" y2="80.5"/>
    <line x1="4.5" y1="82" x2="10" y2="80.5"/>
    <line x1="110" y1="38" x2="115.5" y2="39.5"/>
    <line x1="82" y1="4.5" x2="80.5" y2="10"/>
    <line x1="38" y1="110" x2="39.5" y2="116"/>
  </g>
  <!-- ISO text -->
  <text x="60" y="46" font-family="Arial Black,Arial,sans-serif" font-size="26" font-weight="900" fill="white" text-anchor="middle" letter-spacing="1">ISO</text>
  <!-- Divider line -->
  <line x1="20" y1="54" x2="100" y2="54" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <!-- 22000 text -->
  <text x="60" y="74" font-family="Arial Black,Arial,sans-serif" font-size="20" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-0.5">22000</text>
  <!-- Subtitle -->
  <text x="60" y="89" font-family="Arial,sans-serif" font-size="7" font-weight="500" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="0.5">FOOD SAFETY</text>
  <text x="60" y="99" font-family="Arial,sans-serif" font-size="7" font-weight="500" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="0.5">MGMT SYSTEM</text>
</svg>
