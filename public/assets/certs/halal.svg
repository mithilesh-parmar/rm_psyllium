<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 100">
  <rect width="220" height="100" rx="8" fill="#09612B"/>
  <rect x="3" y="3" width="214" height="94" rx="6" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Circular badge area on left -->
  <circle cx="55" cy="50" r="36" fill="rgba(0,0,0,0.18)"/>
  <circle cx="55" cy="50" r="34" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- Crescent moon (white circle minus green overlap) -->
  <circle cx="50" cy="47" r="20" fill="white"/>
  <circle cx="59" cy="42" r="17.5" fill="#09612B"/>

  <!-- 5-pointed star -->
  <polygon points="80,32 82.4,38.8 89.6,38.8 83.9,43.2 86.2,50 80,46 73.8,50 76.1,43.2 70.4,38.8 77.6,38.8" fill="white"/>

  <!-- Vertical divider -->
  <line x1="100" y1="18" x2="100" y2="82" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>

  <!-- HALAL text -->
  <text x="160" y="47" font-family="Arial Black,Arial,sans-serif" font-size="28" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-0.3">HALAL</text>
  <text x="160" y="67" font-family="Arial,sans-serif" font-size="9.5" font-weight="600" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="2">CERTIFIED</text>
</svg>
