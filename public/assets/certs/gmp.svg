<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Outer circle -->
  <circle cx="60" cy="60" r="58" fill="#155A6A"/>
  <!-- Dashed border ring -->
  <circle cx="60" cy="60" r="50" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-dasharray="6 4"/>
  <!-- Inner circle subtle -->
  <circle cx="60" cy="60" r="42" fill="rgba(0,0,0,0.15)"/>

  <!-- Gear/cog teeth suggestion (industrial quality) -->
  <g fill="rgba(255,255,255,0.12)">
    <rect x="56" y="2" width="8" height="12" rx="2"/>
    <rect x="56" y="106" width="8" height="12" rx="2"/>
    <rect x="2" y="56" width="12" height="8" rx="2"/>
    <rect x="106" y="56" width="12" height="8" rx="2"/>
    <rect x="13" y="13" width="8" height="12" rx="2" transform="rotate(45 17 19)"/>
    <rect x="99" y="13" width="8" height="12" rx="2" transform="rotate(-45 103 19)"/>
    <rect x="13" y="99" width="8" height="12" rx="2" transform="rotate(-45 17 105)"/>
    <rect x="99" y="99" width="8" height="12" rx="2" transform="rotate(45 103 105)"/>
  </g>

  <!-- GMP text -->
  <text x="60" y="56" font-family="Arial Black,Arial,sans-serif" font-size="30" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-0.5">GMP</text>
  <!-- Divider -->
  <line x1="20" y1="63" x2="100" y2="63" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Subtitle -->
  <text x="60" y="77" font-family="Arial,sans-serif" font-size="7" font-weight="600" fill="rgba(255,255,255,0.65)" text-anchor="middle" letter-spacing="0.5">GOOD MANUFACTURING</text>
  <text x="60" y="89" font-family="Arial,sans-serif" font-size="7" font-weight="600" fill="rgba(255,255,255,0.65)" text-anchor="middle" letter-spacing="0.5">PRACTICE</text>
</svg>
